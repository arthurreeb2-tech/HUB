document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};

      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }

      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +

            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
{"pages":{"Hub Ressources export.dc":"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"b0ea3ef5-23bf-41a5-b941-3dc4b94c52c6\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  @font-face { font-family: 'BoucherieBlock'; src: url(\"f243c2a5-087a-4700-a486-b4809251c6cc\") format('truetype'); font-display: swap; }\n  @font-face { font-family: 'DIN Condensed'; src: url(\"95187241-919f-4f66-b7e1-3e9ae9bc59dc\") format('truetype'); font-display: swap; }\n  @font-face { font-family: 'DIN Alternate'; src: url(\"45a0f35e-3f6a-4b6f-a59b-689dc4893ed0\") format('truetype'); font-display: swap; }\n  @font-face { font-family: 'Walkway'; src: url(\"583baea4-f8ed-499a-ac66-7de3602a894a\") format('truetype'); font-display: swap; }\n  @font-face { font-family: 'Drose'; src: url(\"eab45472-947a-4808-b3d2-a5ae442fe3d1\") format('opentype'); font-display: swap; }\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  ::-webkit-scrollbar { height: 10px; width: 10px; }\n  ::-webkit-scrollbar-thumb { background: #E2DED5; border-radius: 6px; }\n  ::-webkit-scrollbar-track { background: transparent; }\n  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n  @keyframes popIn { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }\n  @keyframes drawerIn { from { transform: translateX(-100%); } to { transform: none; } }\n  @keyframes postIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }\n  input:focus, textarea:focus, select:focus { outline: none; border-color: #1A1916; }\n  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 2px solid #1A1916; outline-offset: 2px; border-radius: 6px; }\n  @media (prefers-reduced-motion: reduce) { * { animation-duration: .01ms !important; transition-duration: .01ms !important; } }\n<\u002Fstyle>\n<script src=\"16620ddb-92da-4426-a5be-7ca15b6f0541\" crossorigin=\"anonymous\"><\u002Fscript>\n<\u002Fhelmet>\n<div style=\"min-height: 100vh; background: #FBFAF7; color: #1A1916; font-family: 'Walkway', system-ui, sans-serif; display: flex; flex-direction: column;\">\n\n  <header style=\"position: sticky; top: 0; z-index: 30; background: rgba(251,250,247,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid #ECE8DF; padding: {{ headerPad }};\">\n    <div style=\"display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap;\">\n      <div style=\"display: flex; align-items: center; gap: 14px; min-width: 0;\">\n        <button onclick=\"{{ openMenu }}\" aria-label=\"Menu\" style=\"flex: 0 0 auto; width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; background: #fff; border: 1px solid #E7E2D8; border-radius: 11px; cursor: pointer; transition: box-shadow .18s ease, transform .12s ease;\" style-hover=\"box-shadow: 0 4px 14px rgba(40,36,25,0.10);\" style-active=\"transform: scale(.94);\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A1916\" stroke-width=\"2\" stroke-linecap=\"round\"><line x1=\"3\" y1=\"6\" x2=\"21\" y2=\"6\"><\u002Fline><line x1=\"3\" y1=\"12\" x2=\"21\" y2=\"12\"><\u002Fline><line x1=\"3\" y1=\"18\" x2=\"21\" y2=\"18\"><\u002Fline><\u002Fsvg>\n        <\u002Fbutton>\n        <div style=\"display: flex; flex-direction: column; gap: 4px; min-width: 0;\">\n          <span style=\"font-family: 'DIN Condensed', sans-serif; font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; color: #A39C8C; font-weight: 400;\">{{ name }}<\u002Fspan>\n          <h1 style=\"font-family: 'Drose', serif; font-size: clamp(30px, 5vw, 42px); font-weight: 400; letter-spacing: 0.005em; margin: 0; line-height: 1.1;\">{{ pageTitle }}<\u002Fh1>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: acing: 0.06em; margin-bottom: 6px;\">Dossier<\u002Flabel>\n          <select value=\"{{ draft.columnId }}\" onchange=\"{{ onDraftColumn }}\" style=\"width: 100%; font-family: 'Walkway', sans-serif; font-size: 14px; color: #1A1916; border: 1px solid #E2DED4; border-radius: 10px; padding: 11px 13px; margin-bottom: 18px; background: #fff;\">\n            <sc-for list=\"{{ columnOptions }}\" as=\"opt\" hint-placeholder-count=\"3\">\n              <option value=\"{{ opt.id }}\">{{ opt.title }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fselect>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ draftIsNews }}\" hint-placeholder-val=\"{{ false }}\">\n          <label style=\"display: block; font-size: 12px; font-weight: 600; color: #8A8273; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;\">Date<\u002Flabel>\n          <input type=\"date\" value=\"{{ draft.date }}\" oninput=\"{{ onDraftDate }}\" style=\"width: 100%; font-family: 'Walkway', sans-serif; font-size: 14px; color: #1A1916; border: 1px solid #E2DED4; border-radius: 10px; padding: 10px 13px; margin-bottom: 18px; background: #fff;\">\n\n          <label style=\"display: block; font-size: 12px; font-weight: 600; color: #8A8273; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;\">Contenu<\u002Flabel>\n          <textarea value=\"{{ draft.body }}\" oninput=\"{{ onDraftBody }}\" placeholder=\"Écris ton billet…\" rows=\"6\" style=\"width: 100%; font-family: 'Walkway', sans-serif; font-size: 14px; color: #1A1916; border: 1px solid #E2DED4; border-radius: 10px; padding: 11px 13px; margin-bottom: 18px; resize: vertical; line-height: 1.6;\"><\u002Ftextarea>\n\n          <label style=\"display: block; font-size: 12px; font-weight: 600; color: #8A8273; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;\">Image de couverture (URL, optionnel)<\u002Flabel>\n          <input value=\"{{ draft.cover }}\" oninput=\"{{ onDraftCover }}\" placeholder=\"https://… ou images/post.jpg\" style=\"width: 100%; font-family: 'Walkway', sans-serif; font-size: 14px; color: #1A1916; border: 1px solid #E2DED4; border-radius: 10px; padding: 11px 13px; margin-bottom: 18px;\">\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ draftIsPortfolio }}\" hint-placeholder-val=\"{{ false }}\">\n          <label style=\"display: block; font-size: 12px; font-weight: 600; color: #8A8273; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;\">Page HTML (URL)<\u002Flabel>\n          <input value=\"{{ draft.url }}\" oninput=\"{{ onDraftUrl }}\" placeholder=\"portfolio/projet.html ou https://…\" style=\"width: 100%; font-family: 'Walkway', sans-serif; font-size: 14px; color: #1A1916; border: 1px solid #E2DED4; border-radius: 10px; padding: 11px 13px; margin-bottom: 6px;\">\n          <p style=\"font-size: 12.5px; line-height: 1.5; color: #A39C8C; margin: 0 0 18px;\">Une page de ton repo (chemin relatif) ou une URL complète. Elle sera feuilletée dans le flipbook.<\u002Fp>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ draftShowLinks }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;\">\n          <label style=\"font-size: 12px; font-weight: 600; color: #8A8273; text-transform: uppercase; letter-spacing: 0.06em;\">Liens<\u002Flabel>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;\">\n          <sc-for list=\"{{ draft.links }}\" as=\"link\" hint-placeholder-count=\"1\">\n            <div style=\"display: flex; gap: 7px; align-items: center; flex-wrap: wrap;\">\n              <select value=\"{{ link.type }}\" onchange=\"{{ link.onType }}\" style=\"flex: 0 0 108px; font-family: 'Walkway', sans-serif; font-size: 13px; border: 1px solid #E2DED4; border-radius: 9px; padding: 9px 8px; background: #fff;\">\n                <sc-for list=\"{{ typeOptions }}\" as=\"t\" hint \"display: flex; justify-content: flex-end; gap: 10px;\">\n          <button onclick=\"{{ cancelDraft }}\" style=\"font-family: 'DIN Condensed', sans-serif; font-size: 15px; font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; color: #6B6453; background: transparent; border: 1px solid #E2DED4; border-radius: 10px; padding: 11px 18px; cursor: pointer;\">Annuler<\u002Fbutton>\n          <button onclick=\"{{ saveDraft }}\" style=\"font-family: 'DIN Condensed', sans-serif; font-size: 15px; font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; color: #fff; background: #1A1916; border: none; border-radius: 10px; padding: 11px 22px; cursor: pointer;\">Enregistrer<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showExport }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeExport }}\" style=\"position: fixed; inset: 0; z-index: 60; background: rgba(36,33,24,0.32); display: flex; align-items: flex-start; justify-content: center; padding: 48px 20px; overflow-y: auto; animation: fadeIn .15s ease;\">\n      <div onclick=\"{{ stop }}\" style=\"width: 100%; max-width: 600px; background: #fff; border-radius: 18px; box-shadow: 0 24px 60px rgba(36,33,24,0.22); padding: 26px 28px; animation: popIn .2s ease;\">\n        <h2 style=\"font-family: 'DIN Condensed', sans-serif; font-size: 26px; font-weight: 400; margin: 0 0 6px; letter-spacing: 0.02em; text-transform: uppercase;\">Exporter le code<\u002Fh2>\n        <p style=\"font-size: 13.5px; line-height: 1.55; color: #6B6453; margin: 0 0 16px;\">Copie ce bloc et colle-le dans la méthode <code style=\"font-family: ui-monospace, 'SFMono-Regular', Menlo, monospace; background: #F1EEE6; padding: 1px 5px; border-radius: 4px;\">SEED<\u002Fcode> de ton fichier, puis pousse sur GitHub.<\u002Fp>\n        <textarea readonly=\"{{ true }}\" value=\"{{ exportText }}\" rows=\"12\" style=\"width: 100%; font-family: ui-monospace, 'SFMono-Regular', Menlo, monospace; font-size: 12px; color: #2A271F; border: 1px solid #E2DED4; border-radius: 10px; padding: 13px; background: #FAF8F3; resize: vertical; line-height: 1.5;\"><\u002Ftextarea>\n        <div style=\"display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 16px;\">\n          <button onclick=\"{{ resetData }}\" style=\"font-family: 'DIN Condensed', sans-serif; font-size: 14px; font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; color: #B5503A; background: transparent; border: 1px solid #EAD9D2; border-radius: 10px; padding: 10px 16px; cursor: pointer;\">Réinitialiser<\u002Fbutton>\n          <div style=\"display: flex; gap: 10px;\">\n            <button onclick=\"{{ closeExport }}\" style=\"font-family: 'DIN Condensed', sans-serif; font-size: 15px; font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; color: #6B6453; background: transparent; border: 1px solid #E2DED4; border-radius: 10px; padding: 11px 18px; cursor: pointer;\">Fermer<\u002Fbutton>\n            <button onclick=\"{{ copyExport }}\" style=\"font-family: 'DIN Condensed', sans-serif; font-size: 15px; font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; color: #fff; background: #1A1916; border: none; border-radius: 10px; padding: 11px 22px; cursor: pointer;\">{{ copyLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;editingEnabled&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showRessourcesTab&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showNewsTab&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showPortfolioTab&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  STORE_KEY = 'arthur-ressources-v1';\n  PALETTE = ['#1971C2', '#9C36B5', '#E8590C', '#2B8A3E', '#0CA678', '#5C7CFA', '#D9480F', '#495057'];\n  TYPES = {\n    article: { label: 'Article', color: '#2B8A3E' },\n    pdf:     { label: 'PDF',      color: '#D9480F' },\n    app:     { label: 'Logiciel', color: '#1971C2' },\n    demo:    { label: 'Démo',     color: '#E8590C' },\n    github:  { label: 'GitHub',   color: '#343A40' },\n    video:   { label: 'Vidéo',    color: '#9C36B5' },\n    link:    { label: 'Lien',     color: '#495057' },\n  };\n\n  state = { data: null, page: 'ressources', menuOpen: false, flip: 0, editMode: false, query: '', filterType: null, newsSort: 'desc', newsYear: null, draft: null, showExport: false, copied: false, vw: typeof window !== 'undefined' ? window.innerWidth : 1280 };\n\n  NAV = [\n    { key: 'ressources', label: 'Ressources', dot: '#1971C2' },\n    { key: 'news',       label: 'News',       dot: '#E8590C' },\n    { key: 'portfolio',  label: 'Portfolio',  dot: '#2B8A3E' },\n  ];\n\n  get SEED() {\n    return JSON.parse(`{\"columns\":[{\"id\":\"dev\",\"title\":\"Conception\",\"color\":\"#1971C2\"},{\"id\":\"design\",\"title\":\"Outils et logiciels\",\"color\":\"#E8590C\"},{\"id\":\"outils\",\"title\":\"Recherches & Productivité\",\"color\":\"#2B8A3E\"}],\"cards\":[{\"id\":\"c6\",\"columnId\":\"outils\",\"title\":\"Atlas des Terpènes des forêts Corse\",\"description\":\"Le process que j'utilise chaque semaine.\",\"links\":[{\"id\":\"l9\",\"type\":\"link\",\"label\":\"Le cours (6 modules)\",\"url\":\"https://arthurreeb2-tech.github.io/Corse-Atlas-des-biomes-signatures-terp-niques-/index.html\"},{\"id\":\"laru3x1\",\"type\":\"app\",\"label\":\"L'atlas interactif\",\"url\":\"https://arthurreeb2-tech.github.io/Corse-Atlas-des-biomes-signatures-terp-niques-/atlas_corse.html\"},{\"id\":\"lp3h0m0\",\"type\":\"github\",\"label\":\"Projet Github\",\"url\":\"https://github.com/arthurreeb2-tech/Corse-Atlas-des-biomes-signatures-terp-niques-\"}]}],\"news\":[{\"id\":\"n1\",\"date\":\"2026-06-15\",\"title\":\"Bienvenue sur le hub\",\"cover\":\"\",\"body\":\"Première publication : ce hub centralise toutes mes ressources, mes billets et mon portfolio. Reviens régulièrement, j'y poste mes nouveaux articles, outils et études de cas.\",\"links\":[{\"id\":\"nl1\",\"type\":\"link\",\"label\":\"Me suivre sur Instagram\",\"url\":\"https://instagram.com/\"}]},{\"id\":\"n2\",\"date\":\"2026-06-02\",\"title\":\"Nouvel article — CSS Grid en pratique\",\"cover\":\"\",\"body\":\"Je viens de publier un guide complet sur CSS Grid, avec des exemples concrets et un aide-mémoire téléchargeable. Disponible dans la section Ressources.\",\"links\":[{\"id\":\"nl2\",\"type\":\"article\",\"label\":\"Lire l'article\",\"url\":\"https://example.com/css\"}]}],\"portfolio\":[{\"id\":\"p1\",\"title\":\"Étude de cas — Application météo\",\"url\":\"https://example.com/portfolio/meteo.html\"},{\"id\":\"p2\",\"title\":\"Refonte d'identité visuelle\",\"url\":\"https://example.com/portfolio/branding.html\"}]}`);\n  }\n\n  normalize(d) {\n    d = d || {};\n    if (!Array.isArray(d.columns)) d.columns = this.SEED.columns;\n    if (!Array.isArray(d.cards)) d.cards = this.SEED.cards;\n    if (!Array.isArray(d.news)) d.news = this.SEED.news;\n    if (!Array.isArray(d.portfolio)) d.portfolio = this.SEED.portfolio;\n    return d;\n  }\n\n  componentDidMount() {\n    let data = this.normalize(this.SEED);\n    this.setState({ data });\n    this._onResize = () => this.setState({ vw: window.innerWidth });\n    window.addEventListener('resize', this._onResize);\n    this._lastQ = this.state.query;\n    this._lastEdit = this.state.editMode;\n    this.animateCards();\n  }\n\n  componentDidUpdate() {\n    const q = this.state.query, e = this.state.editMode, f = this.state.filterType, p = this.state.page;\n    const ns = this.state.newsSort, ny = this.state.newsYear;\n    if (this._lastQ !== q || this._lastEdit !== e || this._lastF !== f || this._lastPage !== p || this._lastNs !== ns || this._lastNy !== ny) {\n      this._lastQ = q;\n      this._lastEdit = e;\n      this._lastF = f;\n      this._lastPage = p;\n      this._lastNs = ns;\n      this._lastNy = ny;\n      this.animateCards();\n    }\n    if (this._lastFlip !== this.state.flip) {\n      const dir = this._flipDir || 1;\n      this._lastFlip = this.state.flip;\n      this.animateFlip(dir);\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n\n  showCards(cards) {\n    cards.forEach(c => { c.style.opacity = '1'; c.style.transform = 'none'; });\n  }\n\n  animateCards() {\n    const root = this._view || this._board;\n    if (!root) return;\n    const cards = root.querySelectorAll('[data-card]');\n    if (!cards.length) return;\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    // Never leave cards invisible: if motion is reduced or the page is hidden\n    // (anime suspends its engine while document.hidden), show them immediately.\n    if (reduce) { this.showCards(cards); return; }\n    const run = () => {\n      if (document.hidden) {\n        // Engine won't tick while hidden — show now, animate once on first reveal.\n        this.showCards(cards);\n        const onShow = () => {\n          if (document.hidden) return;\n          document.removeEventListener('visibilitychange', onShow);\n          window.anime({ targets: cards, translateY: [14, 0], opacity: [0, 1], delay: window.anime.stagger(35), duration: 440, easing: 'easeOutCubic' });\n        };\n        document.addEventListener('visibilitychange', onShow);\n        return;\n      }\n      window.anime.suspendWhenDocumentHidden = false;\n      window.anime({ targets: cards, translateY: [14, 0], opacity: [0, 1], delay: window.anime.stagger(35), duration: 440, easing: 'easeOutCubic' });\n    };\n    if (window.anime) { run(); return; }\n    // anime not loaded yet: hold hidden briefly, but guarantee a visible fallback.\n    cards.forEach(c => { c.style.opacity = '0'; });\n    let n = 0;\n    const t = setInterval(() => {\n      if (window.anime) { clearInterval(t); run(); }\n      else if (++n > 40) { clearInterval(t); this.showCards(cards); }\n    }, 50);\n  }\n\n  uid(p) { return (p || 'id') + Math.random().toString(36).slice(2, 8); }\n  clone(d) { return JSON.parse(JSON.stringify(d)); }\n  data() { return this.normalize(this.state.data || this.SEED); }\n  today() { try { return new Date().toISOString().slice(0, 10); } catch (e) { return ''; } }\n  formatDate(s) {\n    if (!s) return '';\n    const m = /^(\\d{4})-(\\d{2})-(\\d{2})/.exec(s);\n    if (!m) return s;\n    const mois = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];\n    return parseInt(m[3], 10) + ' ' + (mois[parseInt(m[2], 10) - 1] || '') + ' ' + m[1];\n  }\n\n  // ---- navigation ----\n  openMenu = () => this.setState({ menuOpen: true });\n  closeMenu = () => this.setState({ menuOpen: false });\n  goTo = (page) => this.setState({ page, menuOpen: false, flip: 0 });\n\n  // ---- news ----\n  setNewsSort = (s) => this.setState({ newsSort: s });\n  setNewsYear = (y) => this.setState({ newsYear: y });\n  openNewsNew = () => this.setState({ draft: { id: null, kind: 'news', title: '', date: this.today(), body: '', cover: '', links: [] } });\n  openNewsEdit = (n) => this.setState({ draft: { ...this.clone(n), kind: 'news' } });\n  confirmDeleteNews = (n) => { if (window.confirm(`Supprimer le billet « ${n.title} » ?`)) { const d = this.clone(this.data()); d.news = d.news.filter(x => x.id !== n.id); this.persist(d); } };\n\n  // ---- portfolio ----\n  openPortfolioNew = () => this.setState({ draft: { id: null, kind: 'portfolio', title: '', url: '' } });\n  openPortfolioEdit = (p) => this.setState({ draft: { ...this.clone(p), kind: 'portfolio' } });\n  confirmDeletePortfolio = (p) => { if (window.confirm(`Supprimer la page « ${p.title} » ?`)) { const d = this.clone(this.data()); d.portfolio = d.portfolio.filter(x => x.id !== p.id); this.persist(d); this.setState({ flip: 0 }); } };\n  prevFlip = () => { const n = this.data().portfolio.length; if (this.state.flip > 0) { this._flipDir = -1; this.setState({ flip: this.state.flip - 1 }); } };\n  nextFlip = () => { const n = this.data().portfolio.length; if (this.state.flip < n - 1) { this._flipDir = 1; this.setState({ flip: this.state.flip + 1 }); } };\n  animateFlip(dir) {\n    const el = this._flip;\n    if (!el || !window.anime) return;\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    if (reduce) return;\n    window.anime.suspendWhenDocumentHidden = false;\n    window.anime({ targets: el, rotateY: [dir < 0 ? 16 : -16, 0], opacity: [0.45, 1], duration: 460, easing: 'easeOutCubic' });\n  }\n\n  persist(d) {\n    this.setState({ data: d });\n    try { localStorage.setItem(this.STORE_KEY, JSON.stringify(d)); } catch (e) {}\n  }\n\n  // ---- columns ----\n  addColumn = () => {\n    const d = this.clone(this.data());\n    d.columns.push({ id: this.uid('col'), title: 'Nouveau dossier', color: this.PALETTE[d.columns.length % this.PALETTE.length] });\n    this.persist(d);\n  };\n  updateColumnTitle = (id, val) => {\n    const d = this.clone(this.data());\n    const c = d.columns.find(c => c.id === id); if (c) c.title = val;\n    this.persist(d);\n  };\n  cycleColor = (id) => {\n    if (!this.state.editMode) return;\n    const d = this.clone(this.data());\n    const c = d.columns.find(c => c.id === id);\n    if (c) { const i = this.PALETTE.indexOf(c.color); c.color = this.PALETTE[(i + 1) % this.PALETTE.length]; }\n    this.persist(d);\n  };\n  confirmDeleteColumn = (col) => {\n    const n = this.data().cards.filter(c => c.columnId === col.id).length;\n    const msg = n ? `Supprimer « ${col.title} » et ses ${n} ressource(s) ?` : `Supprimer « ${col.title} » ?`;\n    if (!window.confirm(msg)) return;\n    const d = this.clone(this.data());\n    d.columns = d.columns.filter(c => c.id !== col.id);\n    d.cards = d.cards.filter(c => c.columnId !== col.id);\n    this.persist(d);\n  };\n  reorderColumn = (colId, beforeColId) => {\n    const d = this.clone(this.data());\n    const i = d.columns.findIndex(c => c.id === colId); if (i < 0) return;\n    const [c] = d.columns.splice(i, 1);\n    const bi = d.columns.findIndex(c => c.id === beforeColId);\n    if (bi < 0) d.columns.push(c); else d.columns.splice(bi, 0, c);\n    this.persist(d);\n  };\n\n  // ---- cards drag ----\n  moveCard = (cardId, colId, beforeCardId) => {\n    const d = this.clone(this.data());\n    const i = d.cards.findIndex(c => c.id === cardId); if (i < 0) return;\n    const [card] = d.cards.splice(i, 1);\n    card.columnId = colId;\n    if (beforeCardId) { const bi = d.cards.findIndex(c => c.id === beforeCardId); d.cards.splice(bi < 0 ? d.cards.length : bi, 0, card); }\n    else d.cards.push(card);\n    this.persist(d);\n  };\n\n  // ---- draft (add/edit card) ----\n  openNew = (colId) => this.setState({ draft: { id: null, kind: 'card', columnId: colId, title: '', description: '', links: [] } });\n  openEdit = (card) => this.setState({ draft: { ...this.clone(card), kind: 'card' } });\n  cancelDraft = () => this.setState({ draft: null });\n  onDraftTitle = (e) => this.setState({ draft: { ...this.state.draft, title: e.target.value } });\n  onDraftDesc = (e) => this.setState({ draft: { ...this.state.draft, description: e.target.value } });\n  onDraftColumn = (e) => this.setState({ draft: { ...this.state.draft, columnId: e.target.value } });\n  onDraftDate = (e) => this.setState({ draft: { ...this.state.draft, date: e.target.value } });\n  onDraftBody = (e) => this.setState({ draft: { ...this.state.draft, body: e.target.value } });\n  onDraftCover = (e) => this.setState({ draft: { ...this.state.draft, cover: e.target.value } });\n  onDraftUrl = (e) => this.setState({ draft: { ...this.state.draft, url: e.target.value } });\n  addLink = () => { const dr = { ...this.state.draft, links: [...this.state.draft.links, { id: this.uid('l'), type: 'link', label: '', url: '' }] }; this.setState({ draft: dr }); };\n  updateLink = (i, patch) => { const links = this.state.draft.links.map((l, j) => j === i ? { ...l, ...patch } : l); this.setState({ draft: { ...this.state.draft, links } }); };\n  removeLink = (i) => { const links = this.state.draft.links.filter((_, j) => j !== i); this.setState({ draft: { ...this.state.draft, links } }); };\n  saveDraft = () => {\n    const dr = this.state.draft;\n    const kind = dr.kind || 'card';\n    if (!dr.title.trim()) { window.alert('Donne un titre.'); return; }\n    const d = this.clone(this.data());\n    if (kind === 'news') {\n      const clean = { id: dr.id || this.uid('n'), date: dr.date || '', title: dr.title.trim(), cover: (dr.cover || '').trim(), body: (dr.body || '').trim(), links: (dr.links || []).filter(l => l.label.trim() || l.url.trim()) };\n      if (dr.id) { const i = d.news.findIndex(x => x.id === dr.id); if (i >= 0) d.news[i] = clean; }\n      else d.news.unshift(clean);\n    } else if (kind === 'portfolio') {\n      const clean = { id: dr.id || this.uid('p'), title: dr.title.trim(), url: (dr.url || '').trim() };\n      if (dr.id) { const i = d.portfolio.findIndex(x => x.id === dr.id); if (i >= 0) d.portfolio[i] = clean; }\n      else d.portfolio.push(clean);\n    } else {\n      const clean = { id: dr.id || this.uid('c'), columnId: dr.columnId, title: dr.title.trim(), description: (dr.description || '').trim(), links: dr.links.filter(l => l.label.trim() || l.url.trim()) };\n      if (dr.id) { const i = d.cards.findIndex(c => c.id === dr.id); if (i >= 0) d.cards[i] = clean; }\n      else d.cards.push(clean);\n    }\n    this.persist(d);\n    this.setState({ draft: null });\n  };\n  confirmDeleteCard = (card) => { if (window.confirm(`Supprimer « ${card.title} » ?`)) { const d = this.clone(this.data()); d.cards = d.cards.filter(c => c.id !== card.id); this.persist(d); } };\n\n  // ---- export ----\n  openExport = () => this.setState({ showExport: true, copied: false });\n  closeExport = () => this.setState({ showExport: false });\n  copyExport = () => { try { navigator.clipboard.writeText(this.exportText()); this.setState({ copied: true }); setTimeout(() => this.setState({ copied: false }), 1800); } catch (e) {} };\n  resetData = () => { if (window.confirm('Recharger les données depuis le code et effacer tes modifications locales ?')) { try { localStorage.removeItem(this.STORE_KEY); } catch (e) {} this.setState({ data: this.SEED, showExport: false }); } };\n  exportText = () => 'return ' + JSON.stringify(this.data(), null, 2) + ';';\n\n  toggleEdit = () => this.setState({ editMode: !this.state.editMode });\n  onSearch = (e) => this.setState({ query: e.target.value });\n  setFilter = (t) => this.setState({ filterType: this.state.filterType === t ? null : t });\n  clearFilter = () => this.setState({ filterType: null });\n  stop = (e) => e.stopPropagation();\n  boardRef = (el) => { this._board = el; };\n  viewRef = (el) => { this._view = el; };\n  flipRef = (el) => { this._flip = el; };\n\n  renderVals() {\n    const data = this.data();\n    const editingEnabled = false; // version publiée : lecture seule, pas d'édition\n    const edit = editingEnabled && this.state.editMode;\n    const vw = this.state.vw || 1280;\n    const stack = vw < 700;\n    const types = this.TYPES;\n    const q = this.state.query.trim().toLowerCase();\n    const ft = this.state.filterType;\n    const matchQ = (c) => !q || (c.title + ' ' + (c.description || '') + ' ' + c.links.map(l => l.label).join(' ')).toLowerCase().includes(q);\n    const matchF = (c) => !ft || c.links.some(l => l.type === ft);\n    const match = (c) => matchQ(c) && matchF(c);\n\n    // Build filter chips only for types actually present in the data\n    const present = {};\n    data.cards.forEach(c => c.links.forEach(l => { present[l.type] = (present[l.type] || 0) + 1; }));\n    const filters = Object.keys(types).filter(k => present[k]).map(k => {\n      const on = ft === k;\n      const t = types[k];\n      return {\n        key: k,\n        label: t.label,\n        dot: t.color,\n        color: on ? '#fff' : '#4A4536',\n        bg: on ? '#1A1916' : '#fff',\n        border: on ? '#1A1916' : '#E7E2D8',\n        onClick: () => this.setFilter(k),\n      };\n    });\n\n    const board = data.columns.map((col) => {\n      const all = data.cards.filter(c => c.columnId === col.id);\n      const cards = all.filter(match).map((card) => ({\n        ...card,\n        hasDescription: !!(card.description && card.description.trim()),\n        links: card.links.map(l => ({ ...l, typeLabel: (types[l.type] || types.link).label, typeColor: (types[l.type] || types.link).color })),\n        draggable: edit,\n        cardCursor: edit ? 'grab' : 'default',\n        onEdit: () => this.openEdit(card),\n        onDelete: () => this.confirmDeleteCard(card),\n        onDragStart: (e) => { if (!edit) return; this.dragCard = card.id; this.dragCol = null; e.stopPropagation(); },\n        onDragOver: (e) => { if (this.dragCard) e.preventDefault(); },\n        onDrop: (e) => { e.preventDefault(); e.stopPropagation(); if (this.dragCard && this.dragCard !== card.id) this.moveCard(this.dragCard, col.id, card.id); this.dragCard = null; },\n      }));\n      return {\n        ...col,\n        cards,\n        count: all.length,\n        isEmpty: cards.length === 0 && !edit,\n        colFlex: stack ? '0 0 auto' : '0 0 320px',\n        colWidth: stack ? '100%' : '320px',\n        headerCursor: edit ? 'grab' : 'default',\n        dotCursor: edit ? 'pointer' : 'default',\n        draggableCol: edit,\n        onTitleChange: (e) => this.updateColumnTitle(col.id, e.target.value),\n        onCycleColor: () => this.cycleColor(col.id),\n        onDelete: () => this.confirmDeleteColumn(col),\n        onAddCard: () => this.openNew(col.id),\n        onColDragStart: (e) => { if (!edit) return; this.dragCol = col.id; this.dragCard = null; },\n        onColDragOver: (e) => { if (this.dragCard || this.dragCol) e.preventDefault(); },\n        onColDrop: (e) => { e.preventDefault(); if (this.dragCol && this.dragCol !== col.id) this.reorderColumn(this.dragCol, col.id); else if (this.dragCard) this.moveCard(this.dragCard, col.id, null); this.dragCol = null; this.dragCard = null; },\n      };\n    });\n\n    // ---- navigation ----\n    const tabVis = {\n      ressources: this.props.showRessourcesTab ?? true,\n      news: this.props.showNewsTab ?? true,\n      portfolio: this.props.showPortfolioTab ?? true,\n    };\n    const visibleNav = this.NAV.filter(n => tabVis[n.key]);\n    let page = this.state.page;\n    if (!tabVis[page]) page = (visibleNav[0] || { key: 'ressources' }).key;\n    const navItems = visibleNav.map(n => ({\n      key: n.key, label: n.label,\n      dot: page === n.key ? n.dot : '#E2DED5',\n      color: page === n.key ? '#1A1916' : '#6B6453',\n      bg: page === n.key ? '#F1EDE4' : 'transparent',\n      onClick: () => this.goTo(n.key),\n    }));\n    const pageTitle = (this.NAV.find(n => n.key === page) || { label: 'Ressources' }).label;\n\n    // ---- news ----\n    const newsSort = this.state.newsSort || 'desc';\n    const newsYear = this.state.newsYear || null;\n    const newsYears = Array.from(new Set(data.news.map(p => (p.date || '').slice(0, 4)).filter(Boolean))).sort().reverse();\n    const newsYearChips = [{ key: null, label: 'Tous' }].concat(newsYears.map(y => ({ key: y, label: y }))).map(c => {\n      const on = newsYear === c.key;\n      return { label: c.label, color: on ? '#fff' : '#4A4536', bg: on ? '#1A1916' : '#fff', border: on ? '#1A1916' : '#E7E2D8', onClick: () => this.setNewsYear(c.key) };\n    });\n    const newsList = data.news\n      .filter(p => !newsYear || (p.date || '').slice(0, 4) === newsYear)\n      .slice()\n      .sort((a, b) => { const A = a.date || '', B = b.date || ''; return newsSort === 'desc' ? (A < B ? 1 : A > B ? -1 : 0) : (A < B ? -1 : A > B ? 1 : 0); });\n    const news = newsList.map(post => ({\n      ...post,\n      dateLabel: this.formatDate(post.date),\n      hasCover: !!(post.cover && post.cover.trim()),\n      coverStyle: 'display:block; width:100%; height:220px; background:#F1EEE6 center/cover no-repeat; background-image:url(\"' + String(post.cover || '').replace(/\"/g, '%22') + '\")',\n      hasLinks: !!(post.links && post.links.length),\n      links: (post.links || []).map(l => ({ ...l, typeLabel: (types[l.type] || types.link).label, typeColor: (types[l.type] || types.link).color })),\n      onEdit: () => this.openNewsEdit(post),\n      onDelete: () => this.confirmDeleteNews(post),\n    }));\n\n    // ---- portfolio (flipbook) ----\n    const pages = data.portfolio;\n    const hasPages = pages.length > 0;\n    const idx = Math.max(0, Math.min(this.state.flip, pages.length - 1));\n    const cur = pages[idx] || { title: '', url: '' };\n    const portfolioManage = pages.map((p, i) => ({ ...p, num: i + 1, onEdit: () => this.openPortfolioEdit(p), onDelete: () => this.confirmDeletePortfolio(p) }));\n\n    const dr = this.state.draft;\n    let draftView = null;\n    if (dr) {\n      draftView = { ...dr, links: (dr.links || []).map((l, i) => ({ ...l, onType: (e) => this.updateLink(i, { type: e.target.value }), onLabel: (e) => this.updateLink(i, { label: e.target.value }), onUrl: (e) => this.updateLink(i, { url: e.target.value }), onRemove: () => this.removeLink(i) })) };\n    }\n    const draftKind = dr ? (dr.kind || 'card') : 'card';\n    const draftTitleMap = {\n      card: dr && dr.id ? 'Modifier la ressource' : 'Nouvelle ressource',\n      news: dr && dr.id ? 'Modifier le billet' : 'Nouveau billet',\n      portfolio: dr && dr.id ? 'Modifier la page' : 'Nouvelle page',\n    };\n    const draftPlaceholderMap = { card: 'Nom de la ressource', news: 'Titre du billet', portfolio: 'Nom de la page' };\n\n    return {\n      name: 'Arthur Reeb',\n      title: 'Ressources',\n      pageTitle,\n      page,\n      showRessources: page === 'ressources',\n      showNews: page === 'news',\n      showPortfolio: page === 'portfolio',\n      menuOpen: this.state.menuOpen,\n      openMenu: this.openMenu,\n      closeMenu: this.closeMenu,\n      navItems,\n      viewRef: this.viewRef,\n      pagePad: stack ? '20px 16px 40px' : '32px 36px 48px',\n      // news\n      news,\n      newsEmpty: news.length === 0,\n      newsHasPosts: data.news.length > 0,\n      newsYearChips,\n      onSortDesc: () => this.setNewsSort('desc'),\n      onSortAsc: () => this.setNewsSort('asc'),\n      sortDescColor: newsSort === 'desc' ? '#fff' : '#8A8273',\n      sortDescBg: newsSort === 'desc' ? '#1A1916' : 'transparent',\n      sortAscColor: newsSort === 'asc' ? '#fff' : '#8A8273',\n      sortAscBg: newsSort === 'asc' ? '#1A1916' : 'transparent',\n      onAddNews: this.openNewsNew,\n      // portfolio\n      portfolioHasPages: hasPages,\n      portfolioEmpty: !hasPages,\n      portfolioManage,\n      currentUrl: cur.url,\n      currentTitle: cur.title,\n      flipLabel: hasPages ? (idx + 1) + ' / ' + pages.length : '',\n      flipAspect: stack ? '3 / 4' : '16 / 10',\n      flipRef: this.flipRef,\n      prevFlip: this.prevFlip,\n      nextFlip: this.nextFlip,\n      flipPrevDisabled: idx <= 0,\n      flipNextDisabled: idx >= pages.length - 1,\n      flipPrevBg: idx <= 0 ? '#F4F1EA' : '#fff',\n      flipNextBg: idx >= pages.length - 1 ? '#F4F1EA' : '#fff',\n      flipPrevColor: idx <= 0 ? '#CBC4B5' : '#1A1916',\n      flipNextColor: idx >= pages.length - 1 ? '#CBC4B5' : '#1A1916',\n      flipPrevCursor: idx <= 0 ? 'default' : 'pointer',\n      flipNextCursor: idx >= pages.length - 1 ? 'default' : 'pointer',\n      onAddPortfolio: this.openPortfolioNew,\n      editMode: edit,\n      notEditMode: !edit,\n      editingEnabled: editingEnabled,\n      headerPad: stack ? '15px 16px' : '22px 36px',\n      boardPad: stack ? '16px 14px 32px' : '28px 36px 40px',\n      boardDir: stack ? 'column' : 'row',\n      boardAlign: stack ? 'stretch' : 'flex-start',\n      boardGap: stack ? '16px' : '20px',\n      boardOverflowX: stack ? 'hidden' : 'auto',\n      boardOverflowY: stack ? 'visible' : 'hidden',\n      addColWidth: stack ? '100%' : '280px',\n      addColFlex: stack ? '0 0 auto' : '0 0 280px',\n      query: this.state.query,\n      onSearch: this.onSearch,\n      filters,\n      filterActive: !!ft,\n      clearFilter: this.clearFilter,\n      filterPad: stack ? '10px 14px' : '12px 36px',\n      board,\n      boardRef: this.boardRef,\n      toggleEdit: this.toggleEdit,\n      addColumn: this.addColumn,\n      editBtnLabel: edit ? 'Terminer' : 'Éditer',\n      editBtnColor: edit ? '#fff' : '#1A1916',\n      editBtnBg: edit ? '#1A1916' : '#fff',\n      editBtnBorder: edit ? '#1A1916' : '#E7E2D8',\n      // draft\n      draftOpen: !!dr,\n      draft: draftView,\n      draftTitle: draftTitleMap[draftKind],\n      draftTitlePlaceholder: draftPlaceholderMap[draftKind],\n      draftIsCard: draftKind === 'card',\n      draftIsNews: draftKind === 'news',\n      draftIsPortfolio: draftKind === 'portfolio',\n      draftShowLinks: draftKind === 'card' || draftKind === 'news',\n      onDraftTitle: this.onDraftTitle,\n      onDraftDesc: this.onDraftDesc,\n      onDraftColumn: this.onDraftColumn,\n      onDraftDate: this.onDraftDate,\n      onDraftBody: this.onDraftBody,\n      onDraftCover: this.onDraftCover,\n      onDraftUrl: this.onDraftUrl,\n      columnOptions: data.columns.map(c => ({ id: c.id, title: c.title })),\n      typeOptions: Object.keys(types).map(k => ({ value: k, label: types[k].label })),\n      addLink: this.addLink,\n      saveDraft: this.saveDraft,\n      cancelDraft: this.cancelDraft,\n      // export\n      showExport: this.state.showExport,\n      openExport: this.openExport,\n      closeExport: this.closeExport,\n      copyExport: this.copyExport,\n      resetData: this.resetData,\n      exportText: this.exportText(),\n      copyLabel: this.state.copied ? 'Copié ✓' : 'Copier',\n      stop: this.stop,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Hub Ressources export.dc"}
